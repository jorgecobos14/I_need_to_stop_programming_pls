plugins {
    id 'com.android.application'
}

android {
    namespace 'com.acho.chat.app'
    compileSdk 35

    defaultConfig {
        applicationId "com.acho.chat.app"
        minSdk 21
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
        debug {
            minifyEnabled false
            shrinkResources false
        }
    }

    compile
